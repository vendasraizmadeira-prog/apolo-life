<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apolo Life — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #222222;
      --border-light: #2a2a2a;
      --text: #ffffff;
      --text-muted: #888888;
      --text-dim: #555555;
      --accent: #ffffff;
      --accent-dim: rgba(255,255,255,0.08);
      --error: #ff4d4d;
      --success: #4dff91;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: #ffffff;
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: 0 0 40px rgba(255,255,255,0.15);
    }

    .logo-mark svg {
      width: 36px;
      height: 36px;
    }

    .logo-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .logo-sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      backdrop-filter: blur(20px);
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    input::placeholder { color: var(--text-dim); }

    .btn {
      width: 100%;
      padding: 15px;
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.99); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 20px;
      display: none;
    }

    .error-msg.show { display: block; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 24px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 4L4 28H32L18 4Z" fill="black" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="18" cy="20" r="4" fill="white"/>
          </svg>
        </div>
        <div class="logo-name">Apolo Life</div>
        <div class="logo-sub">by Apolo CT</div>
      </div>

      <div class="card">
        <div class="card-title">Bem-vindo de volta</div>
        <div class="card-sub">Entre com suas credenciais para acessar</div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn" id="loginBtn">Entrar</button>
        </form>
      </div>

      <div class="footer-text">© 2024 Apolo CT · Todos os direitos reservados</div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    // Redirect if already logged in
    const token = localStorage.getItem('apolo_token');
    const role = localStorage.getItem('apolo_role');
    if (token) {
      window.location.href = role === 'admin' ? '/admin.html' : '/dashboard.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Entrando...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Erro ao entrar');

        localStorage.setItem('apolo_token', data.token);
        localStorage.setItem('apolo_role', data.user.role);
        localStorage.setItem('apolo_name', data.user.name);
        localStorage.setItem('apolo_id', data.user.id);

        window.location.href = data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
